name: CI

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cmake --preset debug && cmake --build build && ctest --test-dir build
  
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: cmake --preset debug && cmake --build build && ctest --test-dir build
  
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - run: cmake --preset debug && cmake --build build && ctest --test-dir build
